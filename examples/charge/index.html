<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starknet MPP &mdash; Charge Example</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ───────────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Palette ─────────────────────────────────────────────── */
    :root {
      --bg:        #0a0a0a;
      --surface:   #0d1117;
      --neon:      #00ff41;
      --cyan:      #00d4ff;
      --magenta:   #f72585;
      --dim:       #3a3a3a;
      --text:      #c0c0c0;
      --mono:      'JetBrains Mono', 'Courier New', monospace;
    }

    /* ── Scanline overlay on the whole page ──────────────────── */
    html::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 65, 0.03) 2px,
        rgba(0, 255, 65, 0.03) 4px
      );
    }

    /* ── Subtle grid background ──────────────────────────────── */
    body {
      font-family: var(--mono);
      background:
        linear-gradient(rgba(0,255,65,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px),
        var(--bg);
      background-size: 40px 40px;
      color: var(--text);
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      min-height: 100vh;
    }

    /* ── Headings ────────────────────────────────────────────── */
    h1 {
      font-family: var(--mono);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--neon);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.6rem;
      text-shadow:
        0 0 7px  var(--neon),
        0 0 20px var(--neon),
        0 0 42px rgba(0,255,65,0.4);
    }

    /* ── Paragraphs ──────────────────────────────────────────── */
    p {
      color: var(--text);
      margin-top: 0;
      margin-bottom: 0.6rem;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    #setup {
      color: var(--cyan);
      text-shadow: 0 0 6px rgba(0,212,255,0.5);
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    button {
      font-family: var(--mono);
      padding: 0.8rem 1.6rem;
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--neon);
      background: transparent;
      border: 1px solid var(--neon);
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      transition: all 0.25s ease;
      box-shadow:
        0 0 5px rgba(0,255,65,0.3),
        inset 0 0 5px rgba(0,255,65,0.1);
      animation: pulse-glow 2.5s ease-in-out infinite;
    }
    button:hover {
      background: rgba(0,255,65,0.08);
      color: #fff;
      border-color: var(--cyan);
      box-shadow:
        0 0 10px var(--cyan),
        0 0 30px rgba(0,212,255,0.3),
        inset 0 0 10px rgba(0,212,255,0.15);
      text-shadow: 0 0 8px var(--cyan);
    }
    button:active {
      transform: scale(0.97);
    }
    button:disabled {
      color: var(--dim);
      border-color: var(--dim);
      cursor: not-allowed;
      box-shadow: none;
      animation: none;
      text-shadow: none;
      background: rgba(255,255,255,0.02);
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 5px rgba(0,255,65,0.3), inset 0 0 5px rgba(0,255,65,0.1); }
      50%      { box-shadow: 0 0 15px rgba(0,255,65,0.5), inset 0 0 10px rgba(0,255,65,0.15); }
    }

    /* ── Output box ──────────────────────────────────────────── */
    #output {
      margin-top: 1.2rem;
      background: var(--surface);
      border: 1px solid var(--cyan);
      border-radius: 6px;
      padding: 1.2rem;
      font-size: 1.05rem;
      text-align: center;
      color: var(--cyan);
      box-shadow:
        0 0 8px  rgba(0,212,255,0.25),
        0 0 24px rgba(0,212,255,0.1);
      text-shadow: 0 0 6px rgba(0,212,255,0.5);
      animation: border-breathe 3s ease-in-out infinite;
    }
    #output:empty { display: none; }

    @keyframes border-breathe {
      0%, 100% { box-shadow: 0 0 8px  rgba(0,212,255,0.25), 0 0 24px rgba(0,212,255,0.1); }
      50%      { box-shadow: 0 0 14px rgba(0,212,255,0.4),  0 0 40px rgba(0,212,255,0.15); }
    }

    /* ── Error state ─────────────────────────────────────────── */
    .error {
      color: var(--magenta) !important;
      font-family: var(--mono);
      background: rgba(247,37,133,0.06) !important;
      border-color: var(--magenta) !important;
      text-shadow: 0 0 6px rgba(247,37,133,0.5);
      box-shadow:
        0 0 8px  rgba(247,37,133,0.25),
        0 0 24px rgba(247,37,133,0.1) !important;
    }

    /* ── Log / terminal area ─────────────────────────────────── */
    #log {
      margin-top: 1.2rem;
      background: #050505;
      border: 1px solid rgba(0,255,65,0.2);
      border-radius: 4px;
      padding: 1rem 1.2rem;
      white-space: pre-wrap;
      overflow-x: auto;
      font-family: var(--mono);
      font-size: 0.8rem;
      line-height: 1.7;
      color: var(--neon);
      text-shadow: 0 0 4px rgba(0,255,65,0.35);
      position: relative;
      max-height: 320px;
      overflow-y: auto;
    }
    #log:empty { display: none; }

    /* Terminal top-bar decoration */
    #log::before {
      content: '[ terminal ]';
      display: block;
      margin-bottom: 0.6rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid rgba(0,255,65,0.15);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--dim);
      text-shadow: none;
    }

    /* ── Flicker animation on page load ──────────────────────── */
    body {
      animation: flicker-in 0.8s ease-out;
    }
    @keyframes flicker-in {
      0%   { opacity: 0; }
      10%  { opacity: 0.6; }
      12%  { opacity: 0.2; }
      20%  { opacity: 0.9; }
      22%  { opacity: 0.4; }
      30%  { opacity: 1; }
      100% { opacity: 1; }
    }

    /* ── Scrollbar styling ───────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb {
      background: rgba(0,255,65,0.25);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0,255,65,0.45);
    }

    /* ── Selection highlight ─────────────────────────────────── */
    ::selection {
      background: rgba(0,212,255,0.3);
      color: #fff;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 480px) {
      body { padding: 1.5rem 1rem; }
      h1   { font-size: 1.3rem; letter-spacing: 0.1em; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <h1>Bullish on Starknet</h1>
  <p>Pay a tiny amount of STRK to hear a bullish thing about Starknet on Sepolia.</p>
  <div id="setup">
    <button type="button" id="connect-btn" style="margin-top: 0.5rem;">Connect Wallet</button>
  </div>
  <div id="ready" style="display: none;">
    <button type="button" id="button">Tell me a bullish thing about Starknet</button>
    <div id="output"></div>
  </div>
  <div id="log"></div>
  <script type="module" src="/src/client.ts"></script>
</body>
</html>
